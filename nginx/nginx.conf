events {
  worker_connections 1024;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;
  sendfile      on;
  client_max_body_size 20M;

  upstream api {
    server server:3000;
  }

  server {
    listen 80;
    server_name _;

    # Serve uploaded files directly from the shared volume
    location /uploads/ {
      alias /app/public/uploads/;
      expires 30d;
      add_header Cache-Control "public, immutable";
    }

    # Proxy everything else to the Node server
    # Upgrade header is required for Socket.IO WebSocket connections
    location / {
      proxy_pass         http://api;
      proxy_http_version 1.1;
      proxy_set_header   Upgrade $http_upgrade;
      proxy_set_header   Connection "upgrade";
      proxy_set_header   Host $host;
      proxy_set_header   X-Real-IP $remote_addr;
      proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_cache_bypass $http_upgrade;
      proxy_read_timeout 86400; # keep long-lived WebSocket connections alive
    }
  }
}
