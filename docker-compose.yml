services:
  postgres:
    image: postgres:16-alpine
    container_name: zchat-postgres
    environment:
      POSTGRES_USER: zchat
      POSTGRES_PASSWORD: zchat
      POSTGRES_DB: zchat
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zchat -d zchat"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: zchat-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10


volumes:
  postgres_data:
  redis_data:
